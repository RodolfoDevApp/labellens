openapi: 3.1.0
info:
  title: LabelLens API
  version: 1.0.0
  description: "Contract for the LabelLens v1 HTTP API. The current scope is food search, barcode lookup, menu calculation, saved menus and favorites. Compare, recipes, pantry inventory and export/PDF are not part of this contract."
servers:
  -
    url: "http://localhost:4000"
    description: Local gateway/API during development
tags:
  -
    name: health
  -
    name: auth
  -
    name: foods
  -
    name: products
  -
    name: menus
  -
    name: favorites
paths:
  /api/v1/health:
    get:
      tags:
        - health
      operationId: getHealth
      summary: Check API health and runtime mode.
      responses:
        200:
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/auth/session:
    post:
      tags:
        - auth
      operationId: startSession
      summary: Start an authenticated session by logging in or registering.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSessionRequest"
      responses:
        200:
          description: Session started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionSuccessResponse"
        202:
          description: Registration created and waiting for confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfirmationRequiredResponse"
        400:
          description: Invalid session request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/confirm:
    post:
      tags:
        - auth
      operationId: confirmSession
      summary: Confirm a Cognito registration code and finish sign-in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthConfirmationRequest"
      responses:
        200:
          description: Account confirmed and session started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionSuccessResponse"
        400:
          description: Invalid confirmation request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/password/forgot:
    post:
      tags:
        - auth
      operationId: requestPasswordReset
      summary: Send a Cognito password recovery code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordResetStartRequest"
      responses:
        200:
          description: Recovery code sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPasswordResetStartResponse"
        400:
          description: Invalid password reset request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        409:
          description: Password reset is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/password/reset:
    post:
      tags:
        - auth
      operationId: confirmPasswordReset
      summary: Confirm a Cognito password recovery code and set a new password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordResetConfirmRequest"
      responses:
        200:
          description: Password updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPasswordResetConfirmResponse"
        400:
          description: Invalid password update request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        409:
          description: Password update is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/me:
    get:
      tags:
        - auth
      operationId: getCurrentUser
      summary: Return the authenticated user.
      security:
        -
          bearerAuth: []
      responses:
        200:
          description: Authenticated user.
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/AuthUser"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/foods/search:
    get:
      tags:
        - foods
      operationId: searchFoods
      summary: Search USDA foods.
      parameters:
        -
          name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        -
          name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        200:
          description: USDA food search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodSearchResponse"
        400:
          description: Invalid food search query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        503:
          description: USDA provider unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/foods/{fdcId}:
    get:
      tags:
        - foods
      operationId: getFoodById
      summary: Get USDA food detail.
      parameters:
        -
          name: fdcId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        200:
          description: USDA food detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodDetailResponse"
        400:
          description: Invalid food id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        404:
          description: Food not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        503:
          description: USDA provider unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/products/barcode/{barcode}:
    get:
      tags:
        - products
      operationId: lookupProductByBarcode
      summary: Look up an Open Food Facts product by barcode.
      parameters:
        -
          name: barcode
          in: path
          required: true
          schema:
            type: string
            pattern: "^\\d{8,14}$"
      responses:
        200:
          description: Product found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductLookupResponse"
        400:
          description: Invalid barcode.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        404:
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        503:
          description: Open Food Facts unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/products/search:
    get:
      tags:
        - products
      operationId: searchProducts
      summary: Search products. Fixture-only/reserved in the current API.
      parameters:
        -
          name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        200:
          description: Product search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSearchResponse"
        400:
          description: Invalid product search query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/menus/calculate:
    post:
      tags:
        - menus
      operationId: calculateMenu
      summary: Calculate menu totals from grams and normalized nutrition facts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuCalculationRequest"
      responses:
        200:
          description: Calculated menu totals.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCalculationResponse"
        400:
          description: Invalid menu calculation request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        422:
          description: Menu calculation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/menus:
    post:
      tags:
        - menus
      operationId: saveMenu
      summary: Save a personal menu.
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMenuRequest"
      responses:
        201:
          description: Menu saved.
          content:
            application/json:
              schema:
                type: object
                required:
                  - menu
                properties:
                  menu:
                    $ref: "#/components/schemas/SavedMenu"
        400:
          description: Invalid saved menu request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    get:
      tags:
        - menus
      operationId: listMenus
      summary: List personal saved menus.
      security:
        -
          bearerAuth: []
      responses:
        200:
          description: Saved menus.
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SavedMenu"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/menus/{menuId}:
    get:
      tags:
        - menus
      operationId: getMenu
      summary: Get one personal saved menu.
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: menuId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        200:
          description: Saved menu.
          content:
            application/json:
              schema:
                type: object
                required:
                  - menu
                properties:
                  menu:
                    $ref: "#/components/schemas/SavedMenu"
        400:
          description: Invalid menu id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        404:
          description: Menu not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    put:
      tags:
        - menus
      operationId: updateMenu
      summary: Update one personal saved menu.
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: menuId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMenuRequest"
      responses:
        200:
          description: Updated menu.
          content:
            application/json:
              schema:
                type: object
                required:
                  - menu
                properties:
                  menu:
                    $ref: "#/components/schemas/SavedMenu"
        400:
          description: Invalid menu update request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        404:
          description: Menu not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      tags:
        - menus
      operationId: deleteMenu
      summary: Delete one personal saved menu.
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: menuId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        200:
          description: Menu deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        400:
          description: Invalid menu id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        404:
          description: Menu not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/favorites:
    post:
      tags:
        - favorites
      operationId: saveFavorite
      summary: Save or update a personal favorite food/product default.
      security:
        -
          bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteItemInput"
      responses:
        201:
          description: Favorite saved.
          content:
            application/json:
              schema:
                type: object
                required:
                  - item
                properties:
                  item:
                    $ref: "#/components/schemas/FavoriteItem"
        400:
          description: Invalid favorite request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    get:
      tags:
        - favorites
      operationId: listFavorites
      summary: List personal favorites.
      security:
        -
          bearerAuth: []
      responses:
        200:
          description: Favorite items.
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FavoriteItem"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/favorites/{favoriteId}:
    delete:
      tags:
        - favorites
      operationId: deleteFavorite
      summary: Delete a personal favorite.
      security:
        -
          bearerAuth: []
      parameters:
        -
          name: favoriteId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        200:
          description: Favorite deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        400:
          description: Invalid favorite id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        401:
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        404:
          description: Favorite not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: dev-token-local-now-cognito-later
  schemas:
    Source:
      type: string
      enum:
        - USDA
        - OPEN_FOOD_FACTS
    NutritionFacts:
      type: object
      required:
        - energyKcalPer100g
        - proteinGPer100g
        - carbsGPer100g
        - fatGPer100g
        - source
        - sourceId
        - lastFetchedAt
        - completeness
      properties:
        energyKcalPer100g:
          type:
            - number
            - "null"
        proteinGPer100g:
          type:
            - number
            - "null"
        carbsGPer100g:
          type:
            - number
            - "null"
        fatGPer100g:
          type:
            - number
            - "null"
        sugarGPer100g:
          type:
            - number
            - "null"
        fiberGPer100g:
          type:
            - number
            - "null"
        sodiumMgPer100g:
          type:
            - number
            - "null"
        source:
          $ref: "#/components/schemas/Source"
        sourceId:
          type: string
          minLength: 1
        lastFetchedAt:
          type: string
          format: date-time
        completeness:
          type: string
          enum:
            - COMPLETE
            - PARTIAL
            - LOW
      additionalProperties: false
    MenuCalculationItem:
      type: object
      required:
        - id
        - source
        - sourceId
        - displayName
        - grams
        - nutrition
      properties:
        id:
          type: string
          minLength: 1
        source:
          $ref: "#/components/schemas/Source"
        sourceId:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        grams:
          type: number
          exclusiveMinimum: 0
          maximum: 10000
        nutrition:
          $ref: "#/components/schemas/NutritionFacts"
      additionalProperties: false
    MealType:
      type: string
      enum:
        - breakfast
        - lunch
        - dinner
        - snack
    MenuMeal:
      type: object
      required:
        - type
        - items
      properties:
        type:
          $ref: "#/components/schemas/MealType"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuCalculationItem"
      additionalProperties: false
    MenuCalculationRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuCalculationItem"
          default: []
      additionalProperties: false
    SaveMenuRequest:
      type: object
      required:
        - meals
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        date:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        meals:
          type: array
          items:
            $ref: "#/components/schemas/MenuMeal"
          minItems: 1
      additionalProperties: false
    MenuTotals:
      type: object
      required:
        - energyKcal
        - proteinG
        - carbsG
        - fatG
      properties:
        energyKcal:
          type: number
        proteinG:
          type: number
        carbsG:
          type: number
        fatG:
          type: number
    MenuCalculationWarning:
      type: object
      required:
        - itemId
        - message
      properties:
        itemId:
          type: string
        message:
          type: string
    MenuCalculationResponse:
      type: object
      required:
        - totals
        - partialData
        - warnings
      properties:
        totals:
          $ref: "#/components/schemas/MenuTotals"
        partialData:
          type: boolean
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/MenuCalculationWarning"
    SavedMenu:
      type: object
      required:
        - menuId
        - ownerId
        - name
        - date
        - meals
        - totals
        - partialData
        - createdAt
        - updatedAt
      properties:
        menuId:
          type: string
        ownerId:
          type: string
        name:
          type: string
        date:
          type: string
        meals:
          type: array
          items:
            $ref: "#/components/schemas/MenuMeal"
        totals:
          $ref: "#/components/schemas/MenuTotals"
        partialData:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FavoriteItemInput:
      type: object
      required:
        - source
        - sourceId
        - displayName
        - grams
        - nutrition
      properties:
        source:
          $ref: "#/components/schemas/Source"
        sourceId:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        grams:
          type: number
          exclusiveMinimum: 0
          maximum: 10000
        nutrition:
          $ref: "#/components/schemas/NutritionFacts"
      additionalProperties: false
    FavoriteItem:
      type: object
      required:
        - favoriteId
        - ownerId
        - source
        - sourceId
        - displayName
        - defaultGrams
        - nutrition
        - createdAt
        - updatedAt
      properties:
        favoriteId:
          type: string
        ownerId:
          type: string
        source:
          $ref: "#/components/schemas/Source"
        sourceId:
          type: string
        displayName:
          type: string
        defaultGrams:
          type: number
        nutrition:
          $ref: "#/components/schemas/NutritionFacts"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AuthUser:
      type: object
      required:
        - userId
        - displayName
      properties:
        userId:
          type: string
        displayName:
          type: string
    AuthSessionRequest:
      type: object
      required:
        - mode
        - email
        - password
      properties:
        mode:
          type: string
          enum:
            - login
            - register
        email:
          type: string
          format: email
          maxLength: 120
        password:
          type: string
          minLength: 8
          maxLength: 128
        displayName:
          type: string
          minLength: 1
          maxLength: 60
      additionalProperties: false
    AuthConfirmationRequest:
      type: object
      required:
        - email
        - password
        - confirmationCode
      properties:
        email:
          type: string
          format: email
          maxLength: 120
        password:
          type: string
          minLength: 8
          maxLength: 128
        confirmationCode:
          type: string
          minLength: 3
          maxLength: 32
      additionalProperties: false
    AuthPasswordResetStartRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 120
      additionalProperties: false
    AuthPasswordResetStartResponse:
      type: object
      required:
        - nextStep
        - email
        - message
      properties:
        nextStep:
          type: string
          enum:
            - reset-password
        email:
          type: string
          format: email
        deliveryDestination:
          type: string
        deliveryMedium:
          type: string
        message:
          type: string
    AuthPasswordResetConfirmRequest:
      type: object
      required:
        - email
        - password
        - confirmationCode
      properties:
        email:
          type: string
          format: email
          maxLength: 120
        password:
          type: string
          minLength: 8
          maxLength: 128
        confirmationCode:
          type: string
          minLength: 3
          maxLength: 32
      additionalProperties: false
    AuthPasswordResetConfirmResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    AuthSessionSuccessResponse:
      type: object
      required:
        - tokenType
        - accessToken
        - user
        - authMode
      properties:
        tokenType:
          type: string
          enum:
            - Bearer
        accessToken:
          type: string
        authMode:
          type: string
          enum:
            - demo
            - cognito
        user:
          $ref: "#/components/schemas/AuthUser"
    AuthConfirmationRequiredResponse:
      type: object
      required:
        - nextStep
        - email
        - message
      properties:
        nextStep:
          type: string
          enum:
            - confirm
        email:
          type: string
          format: email
        deliveryDestination:
          type: string
        deliveryMedium:
          type: string
        message:
          type: string
    AuthSessionResponse:
      oneOf:
        -
          $ref: "#/components/schemas/AuthSessionSuccessResponse"
        -
          $ref: "#/components/schemas/AuthConfirmationRequiredResponse"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - sourceMode
        - storageDriver
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - labellens-api
        sourceMode:
          type: string
        storageDriver:
          type: string
          enum:
            - in-memory
            - dynamodb
    FoodSearchItem:
      type: object
      required:
        - fdcId
        - description
        - dataType
        - source
        - sourceId
        - nutrition
      properties:
        fdcId:
          type: string
        description:
          type: string
        dataType:
          type: string
        brandOwner:
          type: string
        source:
          const: USDA
        sourceId:
          type: string
        nutrition:
          $ref: "#/components/schemas/NutritionFacts"
    FoodSearchResponse:
      type: object
      required:
        - items
        - source
        - page
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FoodSearchItem"
        source:
