services:
  gateway:
    image: node:24-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:gateway"
    environment:
      PORT: 4000
      LABEL_LENS_API_INTERNAL_URL: http://api:4100
      GATEWAY_ALLOWED_ORIGINS: http://localhost:${LABEL_LENS_WEB_PORT:-3000},http://localhost:3000,http://localhost:3001
    ports:
      - "${LABEL_LENS_GATEWAY_PORT:-4000}:4000"
    volumes:
      - ../..:/workspace
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/gateway/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  api:
    image: node:24-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:api"
    environment:
      PORT: 4100
      STORAGE_DRIVER: dynamodb
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LABEL_LENS_TABLE: LabelLensTable
      USDA_API_KEY: ${USDA_API_KEY:-}
    expose:
      - "4100"
    volumes:
      - ../..:/workspace
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4100/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  web:
    image: node:24-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:web"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${LABEL_LENS_GATEWAY_PORT:-4000}
    ports:
      - "${LABEL_LENS_WEB_PORT:-3000}:3000"
    volumes:
      - ../..:/workspace
    depends_on:
      gateway:
        condition: service_healthy

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: dynamodb,sqs,events,s3,cloudwatch
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LABEL_LENS_TABLE: LabelLensTable
    ports:
      - "${LABEL_LENS_LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ../localstack/ready.d:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    environment:
      DYNAMO_ENDPOINT: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "${LABEL_LENS_DYNAMODB_ADMIN_PORT:-8001}:8001"
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  localstack-data:
