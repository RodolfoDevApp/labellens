services:
  api:
    image: node:24-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:api"
    environment:
      PORT: 4000
      STORAGE_DRIVER: dynamodb
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LABEL_LENS_TABLE: LabelLensTable
      USDA_API_KEY: ${USDA_API_KEY:-}
    ports:
      - "4000:4000"
    volumes:
      - ../..:/workspace
    depends_on:
      localstack:
        condition: service_healthy

  web:
    image: node:24-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:web"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace
    depends_on:
      - api

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: dynamodb,sqs,events,s3,cloudwatch
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ../localstack/ready.d:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    environment:
      DYNAMO_ENDPOINT: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "8001:8001"
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  localstack-data:
